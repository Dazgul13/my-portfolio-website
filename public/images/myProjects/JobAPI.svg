<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d27"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="60" y="30" width="680" height="360" rx="10" fill="#1e2130" stroke="#2d3148" stroke-width="1.5"/>
  <rect x="60" y="30" width="680" height="38" rx="10" fill="#252840"/>
  <rect x="60" y="50" width="680" height="18" fill="#252840"/>
  <circle cx="88" cy="49" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="49" r="6" fill="#febc2e"/>
  <circle cx="128" cy="49" r="6" fill="#28c840"/>
  <text x="400" y="53" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">Job Tracker API — Postman</text>

  <!-- Method badges + endpoints -->
  <!-- GET all -->
  <rect x="80" y="82" width="640" height="34" rx="4" fill="#13151f"/>
  <rect x="88" y="90" width="48" height="18" rx="3" fill="#28c840" opacity="0.85"/>
  <text x="112" y="103" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>
  <text x="150" y="103" font-family="monospace" font-size="11" fill="#7c8cf8">/api/jobs</text>
  <text x="560" y="103" font-family="monospace" font-size="10" fill="#555">Retrieve all job applications</text>

  <!-- GET by ID -->
  <rect x="80" y="122" width="640" height="34" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="130" width="48" height="18" rx="3" fill="#28c840" opacity="0.85"/>
  <text x="112" y="143" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>
  <text x="150" y="143" font-family="monospace" font-size="11" fill="#7c8cf8">/api/jobs/<tspan fill="#f4845f">:id</tspan></text>
  <text x="560" y="143" font-family="monospace" font-size="10" fill="#555">Get single application</text>

  <!-- POST -->
  <rect x="80" y="162" width="640" height="34" rx="4" fill="#13151f"/>
  <rect x="88" y="170" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="183" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="183" font-family="monospace" font-size="11" fill="#7c8cf8">/api/jobs</text>
  <text x="560" y="183" font-family="monospace" font-size="10" fill="#555">Create new application</text>

  <!-- PUT -->
  <rect x="80" y="202" width="640" height="34" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="210" width="48" height="18" rx="3" fill="#7c8cf8" opacity="0.9"/>
  <text x="112" y="223" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">PUT</text>
  <text x="150" y="223" font-family="monospace" font-size="11" fill="#7c8cf8">/api/jobs/<tspan fill="#f4845f">:id</tspan></text>
  <text x="560" y="223" font-family="monospace" font-size="10" fill="#555">Update application status</text>

  <!-- DELETE -->
  <rect x="80" y="242" width="640" height="34" rx="4" fill="#13151f"/>
  <rect x="88" y="250" width="48" height="18" rx="3" fill="#ff5f57" opacity="0.85"/>
  <text x="112" y="263" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">DEL</text>
  <text x="150" y="263" font-family="monospace" font-size="11" fill="#7c8cf8">/api/jobs/<tspan fill="#f4845f">:id</tspan></text>
  <text x="560" y="263" font-family="monospace" font-size="10" fill="#555">Delete application</text>

  <!-- Auth endpoints -->
  <text x="88" y="298" font-family="monospace" font-size="10" fill="#555">── AUTH ──────────────────────────────────────────────────────</text>

  <rect x="80" y="306" width="640" height="34" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="314" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="327" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="327" font-family="monospace" font-size="11" fill="#7c8cf8">/api/auth/register</text>
  <text x="560" y="327" font-family="monospace" font-size="10" fill="#555">Register new user</text>

  <rect x="80" y="346" width="640" height="34" rx="4" fill="#13151f"/>
  <rect x="88" y="354" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="367" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="367" font-family="monospace" font-size="11" fill="#7c8cf8">/api/auth/login</text>
  <text x="560" y="367" font-family="monospace" font-size="10" fill="#555">Login &amp; get JWT token</text>
</svg>
