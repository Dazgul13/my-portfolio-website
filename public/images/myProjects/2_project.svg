<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d27"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="60" y="30" width="680" height="360" rx="10" fill="#1e2130" stroke="#2d3148" stroke-width="1.5"/>
  <rect x="60" y="30" width="680" height="38" rx="10" fill="#252840"/>
  <rect x="60" y="50" width="680" height="18" fill="#252840"/>
  <circle cx="88" cy="49" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="49" r="6" fill="#febc2e"/>
  <circle cx="128" cy="49" r="6" fill="#28c840"/>
  <text x="400" y="53" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">Course Booking API — Postman</text>

  <!-- Endpoints -->
  <text x="88" y="90" font-family="monospace" font-size="10" fill="#555">── USERS ─────────────────────────────────────────────────────</text>

  <rect x="80" y="98" width="640" height="32" rx="4" fill="#13151f"/>
  <rect x="88" y="106" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="119" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="119" font-family="monospace" font-size="11" fill="#7c8cf8">/api/users/register</text>
  <text x="560" y="119" font-family="monospace" font-size="10" fill="#555">Register new user</text>

  <rect x="80" y="136" width="640" height="32" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="144" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="157" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="157" font-family="monospace" font-size="11" fill="#7c8cf8">/api/users/login</text>
  <text x="560" y="157" font-family="monospace" font-size="10" fill="#555">Login &amp; get JWT</text>

  <rect x="80" y="174" width="640" height="32" rx="4" fill="#13151f"/>
  <rect x="88" y="182" width="48" height="18" rx="3" fill="#28c840" opacity="0.85"/>
  <text x="112" y="195" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>
  <text x="150" y="195" font-family="monospace" font-size="11" fill="#7c8cf8">/api/users/details</text>
  <text x="560" y="195" font-family="monospace" font-size="10" fill="#555">Get user profile</text>

  <text x="88" y="224" font-family="monospace" font-size="10" fill="#555">── COURSES ───────────────────────────────────────────────────</text>

  <rect x="80" y="232" width="640" height="32" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="240" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="253" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="253" font-family="monospace" font-size="11" fill="#7c8cf8">/api/courses</text>
  <text x="560" y="253" font-family="monospace" font-size="10" fill="#555">Create course (admin)</text>

  <rect x="80" y="270" width="640" height="32" rx="4" fill="#13151f"/>
  <rect x="88" y="278" width="48" height="18" rx="3" fill="#28c840" opacity="0.85"/>
  <text x="112" y="291" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>
  <text x="150" y="291" font-family="monospace" font-size="11" fill="#7c8cf8">/api/courses/all</text>
  <text x="560" y="291" font-family="monospace" font-size="10" fill="#555">Get all courses</text>

  <rect x="80" y="308" width="640" height="32" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="316" width="48" height="18" rx="3" fill="#7c8cf8" opacity="0.9"/>
  <text x="112" y="329" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">PUT</text>
  <text x="150" y="329" font-family="monospace" font-size="11" fill="#7c8cf8">/api/courses/<tspan fill="#f4845f">:id</tspan>/archive</text>
  <text x="560" y="329" font-family="monospace" font-size="10" fill="#555">Archive course</text>

  <rect x="80" y="346" width="640" height="32" rx="4" fill="#13151f"/>
  <rect x="88" y="354" width="48" height="18" rx="3" fill="#f9c74f" opacity="0.9"/>
  <text x="112" y="367" font-family="monospace" font-size="10" fill="#111" text-anchor="middle" font-weight="bold">POST</text>
  <text x="150" y="367" font-family="monospace" font-size="11" fill="#7c8cf8">/api/courses/<tspan fill="#f4845f">:id</tspan>/enroll</text>
  <text x="560" y="367" font-family="monospace" font-size="10" fill="#555">Enroll in course</text>
</svg>
