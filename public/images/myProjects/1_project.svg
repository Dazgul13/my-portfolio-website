<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d27"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Browser chrome -->
  <rect x="60" y="40" width="680" height="340" rx="10" fill="#1e2130" stroke="#2d3148" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="60" y="40" width="680" height="38" rx="10" fill="#252840"/>
  <rect x="60" y="60" width="680" height="18" fill="#252840"/>
  <!-- Traffic lights -->
  <circle cx="88" cy="59" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="59" r="6" fill="#febc2e"/>
  <circle cx="128" cy="59" r="6" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="160" y="49" width="380" height="20" rx="10" fill="#1a1d2e"/>
  <text x="350" y="63" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">api.postman.com/collections/ecommerce</text>

  <!-- Postman-style content -->
  <!-- Method + endpoint row -->
  <rect x="80" y="98" width="640" height="36" rx="4" fill="#1a1d2e"/>
  <rect x="88" y="106" width="52" height="20" rx="3" fill="#ff6b35"/>
  <text x="114" y="120" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>
  <text x="200" y="120" font-family="monospace" font-size="11" fill="#7c8cf8">/api/v1/products</text>
  <rect x="660" y="106" width="52" height="20" rx="3" fill="#28c840"/>
  <text x="686" y="120" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">Send</text>

  <!-- Response panel -->
  <rect x="80" y="144" width="640" height="220" rx="4" fill="#13151f"/>
  <!-- Status bar -->
  <rect x="80" y="144" width="640" height="24" rx="4" fill="#1a1d2e"/>
  <text x="96" y="160" font-family="monospace" font-size="10" fill="#28c840">● 200 OK</text>
  <text x="200" y="160" font-family="monospace" font-size="10" fill="#555">Time: 142ms</text>
  <text x="320" y="160" font-family="monospace" font-size="10" fill="#555">Size: 4.2 KB</text>

  <!-- JSON response -->
  <text x="96" y="186" font-family="monospace" font-size="11" fill="#555">{</text>
  <text x="112" y="202" font-family="monospace" font-size="11" fill="#7c8cf8">"status"</text><text x="196" y="202" font-family="monospace" font-size="11" fill="#ccc">: </text><text x="210" y="202" font-family="monospace" font-size="11" fill="#f9c74f">"success"</text><text x="282" y="202" font-family="monospace" font-size="11" fill="#555">,</text>
  <text x="112" y="218" font-family="monospace" font-size="11" fill="#7c8cf8">"count"</text><text x="184" y="218" font-family="monospace" font-size="11" fill="#ccc">: </text><text x="198" y="218" font-family="monospace" font-size="11" fill="#f4845f">24</text><text x="212" y="218" font-family="monospace" font-size="11" fill="#555">,</text>
  <text x="112" y="234" font-family="monospace" font-size="11" fill="#7c8cf8">"data"</text><text x="172" y="234" font-family="monospace" font-size="11" fill="#ccc">: [</text>
  <text x="128" y="250" font-family="monospace" font-size="11" fill="#555">{</text>
  <text x="144" y="266" font-family="monospace" font-size="11" fill="#7c8cf8">"id"</text><text x="176" y="266" font-family="monospace" font-size="11" fill="#ccc">: </text><text x="190" y="266" font-family="monospace" font-size="11" fill="#f4845f">1</text><text x="198" y="266" font-family="monospace" font-size="11" fill="#555">,</text>
  <text x="144" y="282" font-family="monospace" font-size="11" fill="#7c8cf8">"name"</text><text x="200" y="282" font-family="monospace" font-size="11" fill="#ccc">: </text><text x="214" y="282" font-family="monospace" font-size="11" fill="#f9c74f">"Wireless Headphones"</text><text x="390" y="282" font-family="monospace" font-size="11" fill="#555">,</text>
  <text x="144" y="298" font-family="monospace" font-size="11" fill="#7c8cf8">"price"</text><text x="208" y="298" font-family="monospace" font-size="11" fill="#ccc">: </text><text x="222" y="298" font-family="monospace" font-size="11" fill="#f4845f">89.99</text>
  <text x="128" y="314" font-family="monospace" font-size="11" fill="#555">},</text>
  <text x="128" y="330" font-family="monospace" font-size="11" fill="#555">...</text>
  <text x="112" y="346" font-family="monospace" font-size="11" fill="#ccc">]</text>
  <text x="96" y="358" font-family="monospace" font-size="11" fill="#555">}</text>
</svg>
